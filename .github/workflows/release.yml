name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            archive: msi
            ext: msi
          - target: x86_64-apple-darwin
            os: macos-13
            archive: dmg
            ext: dmg
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: dmg
            ext: dmg

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-pkg-config

      - name: Build Go Sidecar
        shell: bash
        run: |
          if [ ! -d "cmd/chatlog" ]; then
            echo "cmd/chatlog directory not found, using pre-built sidecar or skipping"
            mkdir -p src-tauri/binaries
            touch "src-tauri/binaries/chatlog_alpha-${{ matrix.target }}"
          else
            BINARY_NAME="chatlog_alpha-${{ matrix.target }}"
            if [[ "${{ runner.os }}" == "Windows" ]]; then
              BINARY_NAME="${BINARY_NAME}.exe"
            fi
            go build -o "src-tauri/binaries/${BINARY_NAME}" ./cmd/chatlog
          fi

      - name: Install Dependencies
        run: pnpm install

      - name: Tauri Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "chatlog_alpha v__VERSION__"
          releaseBody: |
            更新内容请参见 CHANGELOG。
            下载适合你平台的安装包：
            - **macOS (Intel)**: `chatlog_alpha_x64.dmg`
            - **macOS (Apple Silicon)**: `chatlog_alpha_aarch64.dmg`
            - **Windows**: `chatlog_alpha_x64.msi`
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  publish-update-json:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate update.json
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          REPO="${{ github.repository }}"
          cat > update.json << EOF
          {
            "version": "${VERSION}",
            "notes": "请查看 GitHub Releases 获取详细更新内容",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-x86_64": {
                "signature": "",
                "url": "https://github.com/${REPO}/releases/download/${{ github.ref_name }}/chatlog_alpha_x64.dmg"
              },
              "darwin-aarch64": {
                "signature": "",
                "url": "https://github.com/${REPO}/releases/download/${{ github.ref_name }}/chatlog_alpha_aarch64.dmg"
              },
              "windows-x86_64": {
                "signature": "",
                "url": "https://github.com/${REPO}/releases/download/${{ github.ref_name }}/chatlog_alpha_x64.msi"
              }
            }
          }
          EOF

      - name: Upload update.json
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: update.json
