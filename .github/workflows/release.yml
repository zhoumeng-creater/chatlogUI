name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            archive: msi
            ext: msi
          - target: x86_64-apple-darwin
            os: macos-13
            archive: dmg
            ext: dmg
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: dmg
            ext: dmg
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: appimage
            ext: AppImage

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate updater signing secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          if [[ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is required for signed updater artifacts"
            exit 1
          fi
          if [[ -z "${TAURI_UPDATER_PUBKEY}" ]]; then
            echo "::error::TAURI_UPDATER_PUBKEY is required so the app can verify updates"
            exit 1
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Configure updater public key
        shell: bash
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
        run: |
          node -e "const fs=require('fs'); const p='src-tauri/tauri.conf.json'; const c=JSON.parse(fs.readFileSync(p,'utf8')); c.plugins.updater.pubkey=process.env.TAURI_UPDATER_PUBKEY; fs.writeFileSync(p, JSON.stringify(c,null,2)+'\n');"

      - name: Install MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-pkg-config

      - name: Prepare Sidecar
        shell: bash
        run: bash .github/scripts/prepare-sidecar.sh "${{ matrix.target }}" release

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Frontend
        run: pnpm verify

      - name: Tauri Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          VITE_ENABLE_UPDATER: "true"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "chatlog_alpha v__VERSION__"
          releaseBody: |
            更新内容请参见 CHANGELOG。
            下载适合你平台的安装包：
            - **macOS (Intel)**: `chatlog_alpha_x64.dmg`
            - **macOS (Apple Silicon)**: `chatlog_alpha_aarch64.dmg`
            - **Windows**: `chatlog_alpha_x64.msi`
            - **Linux**: `chatlog_alpha_x64.AppImage`
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }} --config '{"bundle":{"createUpdaterArtifacts":true}}'
